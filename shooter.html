<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Strike 3D</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; max-width: 100%; height: auto; border: 2px solid #0f3460; box-shadow: 0 0 40px rgba(83,216,251,0.15), 0 0 80px rgba(233,69,96,0.08); }
  </style>
</head>
<body>
<canvas id="game" width="900" height="650"></canvas>
<script>
const W=900, H=650;
const FOCAL=420, HORIZON=235;

const C={
  pink:'#e94560', cyan:'#53d8fb', amber:'#f5a623',
  purple:'#8b00ff', green:'#4caf50', white:'#ffffff',
};
const POWERUP_CFG={
  spread:{ color:C.green,   label:'SPREAD',  duration:10 },
  rapid: { color:C.amber,   label:'RAPID',   duration:10 },
  laser: { color:'#dd00ff', label:'LASER',   duration:10 },
  missile:{ color:C.pink,   label:'MISSILE', duration:10 },
  shield:{ color:C.cyan,    label:'+30 HP',  duration:0  },
};
const PU_TYPES=['spread','rapid','laser','missile','shield'];

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=(a,b)=>a+Math.random()*(b-a);
const randInt=(a,b)=>Math.floor(rand(a,b+1));
function isBossWave(w){ return w>0&&w%5===0; }

// ─── Camera ───────────────────────────────────────────────────────────────────
const cam={x:0, y:80};
function project(wx,wy,wz){
  if(wz<=1) return null;
  const s=FOCAL/wz;
  return { x:W/2+(wx-cam.x)*s, y:HORIZON-(wy-cam.y)*s, s };
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys={};
const mouse={x:W/2,y:H/2};

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx=null;
function getAudio(){ if(!audioCtx) try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} return audioCtx; }
function playShot(){
  const a=getAudio(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain();
  o.type='square'; o.frequency.setValueAtTime(700,a.currentTime); o.frequency.exponentialRampToValueAtTime(180,a.currentTime+0.05);
  g.gain.setValueAtTime(0.07,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.06);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.07);
}
function playBang(){
  const a=getAudio(); if(!a) return;
  const buf=a.createBuffer(1,a.sampleRate*0.4,a.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=a.createBufferSource(),g=a.createGain();
  src.buffer=buf; g.gain.setValueAtTime(0.2,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);
  src.connect(g); g.connect(a.destination); src.start();
}
function playHit(){
  const a=getAudio(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine'; o.frequency.setValueAtTime(280,a.currentTime); o.frequency.exponentialRampToValueAtTime(80,a.currentTime+0.1);
  g.gain.setValueAtTime(0.12,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.1);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.11);
}
function playPU(){
  const a=getAudio(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine'; o.frequency.setValueAtTime(400,a.currentTime);
  o.frequency.linearRampToValueAtTime(800,a.currentTime+0.15);
  o.frequency.linearRampToValueAtTime(600,a.currentTime+0.3);
  g.gain.setValueAtTime(0.18,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.35);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.35);
}
function playEnemyShot(){
  const a=getAudio(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(180,a.currentTime); o.frequency.exponentialRampToValueAtTime(60,a.currentTime+0.12);
  g.gain.setValueAtTime(0.05,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.13);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.14);
}
function playBossDeath(){
  const a=getAudio(); if(!a) return;
  const buf=a.createBuffer(1,a.sampleRate*0.9,a.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=a.createBufferSource(),g=a.createGain();
  src.buffer=buf; g.gain.setValueAtTime(0.3,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.9);
  src.connect(g); g.connect(a.destination); src.start();
  const o=a.createOscillator(),g2=a.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(1000,a.currentTime); o.frequency.exponentialRampToValueAtTime(25,a.currentTime+1.0);
  g2.gain.setValueAtTime(0.2,a.currentTime); g2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.0);
  o.connect(g2); g2.connect(a.destination); o.start(); o.stop(a.currentTime+1.0);
}

// ─── Particles ────────────────────────────────────────────────────────────────
class Particle {
  constructor(wx,wy,wz,vx,vy,vz,life,size,color){
    Object.assign(this,{wx,wy,wz,vx,vy,vz,life,maxLife:life,size,color,alive:true});
  }
  update(dt){
    this.wx+=this.vx*dt; this.wy+=this.vy*dt; this.wz+=this.vz*dt;
    this.vy-=50*dt;
    this.life-=dt; if(this.life<=0) this.alive=false;
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p||p.y>H+20||p.y<0) return;
    const r=Math.max(1,this.size*p.s*50);
    ctx.globalAlpha=clamp(this.life/this.maxLife,0,1);
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}
function explode3D(wx,wy,wz,color,particles,n=12){
  for(let i=0;i<n;i++){
    const spd=rand(20,100), a1=rand(0,Math.PI*2), a2=rand(-0.8,0.8);
    particles.push(new Particle(wx,wy,wz,
      Math.cos(a1)*Math.cos(a2)*spd, Math.sin(a2)*spd+30, Math.sin(a1)*Math.cos(a2)*spd,
      rand(0.3,0.8), rand(0.02,0.07), color));
  }
}

// ─── Player Bullet ────────────────────────────────────────────────────────────
class PBullet {
  constructor(wx,wy,wz,vz,damage,type='normal'){
    Object.assign(this,{wx,wy,wz,vz,damage,type,alive:true,age:0});
    this.radius=type==='laser'?55:type==='missile'?35:20;
    this.hitEnemies=new Set();
    this.trail=[];
  }
  update(dt){
    this.trail.push({wx:this.wx,wy:this.wy,wz:this.wz});
    if(this.trail.length>5) this.trail.shift();
    this.wz+=this.vz*dt; this.age+=dt;
    if(this.wz>4500||this.age>2.2) this.alive=false;
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p) return;
    const col=this.type==='laser'?'#dd00ff':this.type==='rapid'?C.amber:this.type==='spread'?C.green:C.cyan;
    for(let i=0;i<this.trail.length;i++){
      const tp=project(this.trail[i].wx,this.trail[i].wy,this.trail[i].wz); if(!tp) continue;
      ctx.globalAlpha=(i/this.trail.length)*0.35;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(tp.x,tp.y,Math.max(1,3*tp.s),0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.save(); ctx.translate(p.x,p.y);
    const r=this.type==='laser'?5:3;
    ctx.shadowBlur=16; ctx.shadowColor=col;
    ctx.fillStyle=C.white;
    ctx.beginPath(); ctx.ellipse(0,0,r*p.s,r*2.2*p.s,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle=col;
    ctx.beginPath(); ctx.ellipse(0,0,r*0.55*p.s,r*1.2*p.s,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─── Enemy Bullet ─────────────────────────────────────────────────────────────
class EBullet {
  constructor(wx,wy,wz,vx,vy,vz,damage){
    Object.assign(this,{wx,wy,wz,vx,vy,vz,damage,alive:true,age:0});
    this.maxAge=3.5;
  }
  update(dt){
    this.wx+=this.vx*dt; this.wy+=this.vy*dt; this.wz+=this.vz*dt;
    this.age+=dt; if(this.age>this.maxAge||this.wz<-100) this.alive=false;
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p||p.y>H+10) return;
    const r=Math.max(3,6*p.s);
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowBlur=12; ctx.shadowColor=C.pink; ctx.fillStyle=C.pink;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,200,200,0.9)';
    ctx.beginPath(); ctx.arc(0,0,r*0.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─── Enemy Jet ────────────────────────────────────────────────────────────────
class EnemyJet {
  constructor(wave){
    this.wx=rand(-480,480); this.wy=rand(40,180); this.wz=rand(1800,3000);
    this.vz=-(85+wave*8); this.vx=rand(-15,15);
    this.hp=28+wave*4; this.maxHp=this.hp;
    this.radius=26; this.score=20; this.alive=true; this.flashTimer=0;
    this.fireTimer=rand(1.5,3.5); this.rotPhase=rand(0,Math.PI*2);
  }
  update(dt,eBullets){
    this.wz+=this.vz*dt; this.wx=clamp(this.wx+this.vx*dt,-700,700);
    this.rotPhase+=dt*0.4; this.flashTimer=Math.max(0,this.flashTimer-dt);
    this.fireTimer-=dt;
    if(this.fireTimer<=0&&this.wz<2000&&this.wz>200){
      this.fireTimer=rand(2,4);
      const dx=(cam.x-this.wx)*0.004, dy=(cam.y-this.wy)*0.004;
      eBullets.push(new EBullet(this.wx,this.wy,this.wz,dx*500,dy*400,-430,11));
      playEnemyShot();
    }
    if(this.wz<-100) this.alive=false;
  }
  takeDamage(amount,particles){
    this.hp-=amount; this.flashTimer=0.12;
    if(this.hp<=0){ this.alive=false; explode3D(this.wx,this.wy,this.wz,C.amber,particles,14); playBang(); }
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p||p.y>H+30||p.y<HORIZON-60) return;
    const s=p.s, fl=this.flashTimer>0;
    ctx.save(); ctx.translate(p.x,p.y); ctx.scale(s,s); ctx.rotate(Math.sin(this.rotPhase)*0.08);
    ctx.shadowBlur=fl?22:5; ctx.shadowColor=fl?C.white:C.amber;
    // Body
    ctx.fillStyle=fl?C.white:'#c07820';
    ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(7,8); ctx.lineTo(4,18); ctx.lineTo(0,14); ctx.lineTo(-4,18); ctx.lineTo(-7,8); ctx.closePath(); ctx.fill();
    // Wings
    ctx.fillStyle=fl?C.white:'#a06010';
    ctx.beginPath(); ctx.moveTo(6,3); ctx.lineTo(38,16); ctx.lineTo(30,21); ctx.lineTo(8,13); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-6,3); ctx.lineTo(-38,16); ctx.lineTo(-30,21); ctx.lineTo(-8,13); ctx.closePath(); ctx.fill();
    // Tail fins
    ctx.fillStyle=fl?C.white:'#906010';
    ctx.beginPath(); ctx.moveTo(3,12); ctx.lineTo(15,20); ctx.lineTo(4,20); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-3,12); ctx.lineTo(-15,20); ctx.lineTo(-4,20); ctx.closePath(); ctx.fill();
    // Cockpit
    ctx.fillStyle=fl?C.white:'rgba(80,180,255,0.7)';
    ctx.beginPath(); ctx.ellipse(0,-12,3,7,0,0,Math.PI*2); ctx.fill();
    // Engine
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,120,20,0.85)';
    ctx.beginPath(); ctx.ellipse(0,18,3,5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if(this.hp<this.maxHp){
      const bw=38*s,bh=3,bx=p.x-bw/2,by=p.y-36*s;
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=C.amber; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    }
  }
}

// ─── Tank ─────────────────────────────────────────────────────────────────────
class Tank {
  constructor(wave){
    this.wx=rand(-540,540); this.wy=0; this.wz=rand(1600,3000);
    this.vz=-(22+wave*4);
    this.hp=90+wave*14; this.maxHp=this.hp;
    this.radius=42; this.score=50; this.alive=true; this.flashTimer=0;
    this.fireTimer=rand(2,5); this.turretAngle=0;
  }
  update(dt,eBullets){
    this.wz+=this.vz*dt; this.turretAngle+=dt*0.38; this.flashTimer=Math.max(0,this.flashTimer-dt);
    this.fireTimer-=dt;
    if(this.fireTimer<=0&&this.wz<1800&&this.wz>200){
      this.fireTimer=rand(2.5,5);
      const dx=(cam.x-this.wx)*0.003;
      eBullets.push(new EBullet(this.wx,this.wy+30,this.wz,dx*600,130,-360,17));
      playEnemyShot();
    }
    if(this.wz<-200) this.alive=false;
  }
  takeDamage(amount,particles){
    this.hp-=amount; this.flashTimer=0.12;
    if(this.hp<=0){ this.alive=false; explode3D(this.wx,this.wy+10,this.wz,'#4a5a2a',particles,16); playBang(); }
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p||p.y>H+20||p.y<HORIZON) return;
    const s=p.s, fl=this.flashTimer>0;
    ctx.save(); ctx.translate(p.x,p.y); ctx.scale(s,s);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0,18,34,9,0,0,Math.PI*2); ctx.fill();
    // Tracks
    ctx.fillStyle='#252a18';
    ctx.fillRect(-34,2,68,14);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=2;
    for(let i=-3;i<=3;i++){ ctx.beginPath(); ctx.moveTo(i*10+5,2); ctx.lineTo(i*10+5,16); ctx.stroke(); }
    // Hull body
    ctx.shadowBlur=fl?18:4; ctx.shadowColor=fl?C.white:'#3a4a1a';
    ctx.fillStyle=fl?C.white:'#4a5a2a';
    ctx.fillRect(-28,-12,56,18);
    // Sloped front armor
    ctx.beginPath(); ctx.moveTo(-28,-12); ctx.lineTo(28,-12); ctx.lineTo(22,-23); ctx.lineTo(-22,-23); ctx.closePath(); ctx.fill();
    // Side skirts
    ctx.fillStyle=fl?C.white:'#3a4a1a';
    ctx.fillRect(-30,2,6,12); ctx.fillRect(24,2,6,12);
    // Turret ring
    ctx.fillStyle=fl?C.white:'#384828';
    ctx.beginPath(); ctx.arc(0,-15,15,0,Math.PI*2); ctx.fill();
    // Turret body
    ctx.fillStyle=fl?C.white:'#2e3c1a';
    ctx.beginPath(); ctx.ellipse(0,-15,10,8,0,0,Math.PI*2); ctx.fill();
    // Gun barrel
    ctx.save(); ctx.translate(0,-15); ctx.rotate(this.turretAngle);
    ctx.fillStyle=fl?C.white:'#1e2c0e';
    ctx.fillRect(-3,0,6,28); // barrel
    ctx.fillRect(-5,-4,10,6); // mantlet
    // Barrel tip detail
    ctx.fillStyle=fl?C.white:'#0e1c06';
    ctx.fillRect(-2,26,4,3);
    ctx.restore();
    // Commander hatch
    ctx.fillStyle=fl?C.white:'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(-3,-18,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
    // HP bar
    const bw=48*s,bh=3,bx=p.x-bw/2,by=p.y-42*s;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=C.green; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
  }
}

// ─── Warship ──────────────────────────────────────────────────────────────────
class Warship {
  constructor(wave){
    this.wx=rand(-160,160); this.wy=-12; this.wz=rand(2000,3500);
    this.vz=-(10+wave*2);
    this.hp=480+wave*55; this.maxHp=this.hp;
    this.radius=115; this.score=200; this.alive=true; this.flashTimer=0;
    this.fireTimer=rand(0.8,2); this.turretPhase=0; this.smokeTimer=0;
  }
  update(dt,eBullets,particles){
    this.wz+=this.vz*dt; this.turretPhase+=dt*0.55; this.flashTimer=Math.max(0,this.flashTimer-dt);
    this.smokeTimer-=dt;
    if(this.smokeTimer<=0){
      this.smokeTimer=0.18;
      particles.push(new Particle(this.wx+40,this.wy+65,this.wz,rand(-4,4),22,rand(-8,8),0.9,0.035,'rgba(140,140,140,0.35)'));
      particles.push(new Particle(this.wx+55,this.wy+65,this.wz,rand(-4,4),18,rand(-8,8),0.7,0.025,'rgba(120,120,120,0.3)'));
    }
    this.fireTimer-=dt;
    if(this.fireTimer<=0&&this.wz<2800&&this.wz>250){
      this.fireTimer=rand(1.2,2.5);
      for(const ox of [-85,0,85]){
        const dx=(cam.x-(this.wx+ox))*0.002;
        eBullets.push(new EBullet(this.wx+ox,this.wy+42,this.wz,dx*550,160,-300,19));
      }
      playEnemyShot();
    }
    if(this.wz<-400) this.alive=false;
  }
  takeDamage(amount,particles){
    this.hp-=amount; this.flashTimer=0.1;
    if(this.hp<=0){
      this.alive=false;
      for(let i=0;i<3;i++) explode3D(this.wx+rand(-70,70),this.wy+rand(0,40),this.wz,'#708090',particles,20);
      playBang();
    }
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p||p.y>H+60||p.y<HORIZON-40) return;
    const s=Math.min(p.s,1.1), fl=this.flashTimer>0;
    ctx.save(); ctx.translate(p.x,p.y); ctx.scale(s,s);
    // Wake
    ctx.fillStyle='rgba(40,70,130,0.22)';
    ctx.beginPath(); ctx.ellipse(0,28,140,22,0,0,Math.PI*2); ctx.fill();
    // Hull
    ctx.shadowBlur=fl?25:8; ctx.shadowColor=fl?C.white:'rgba(100,120,150,0.6)';
    ctx.fillStyle=fl?C.white:'#607080';
    ctx.beginPath(); ctx.moveTo(-125,-8); ctx.lineTo(125,-8); ctx.lineTo(112,20); ctx.lineTo(-112,20); ctx.closePath(); ctx.fill();
    // Waterline stripe
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-118,-1); ctx.lineTo(118,-1); ctx.stroke();
    // Hull sub-structure (lower)
    ctx.fillStyle=fl?C.white:'#506070';
    ctx.beginPath(); ctx.moveTo(-112,20); ctx.lineTo(112,20); ctx.lineTo(100,42); ctx.lineTo(-100,42); ctx.closePath(); ctx.fill();
    // Rear superstructure
    ctx.fillStyle=fl?C.white:'#455565';
    ctx.fillRect(28,-32,72,24);
    ctx.fillRect(38,-52,52,22);
    // Bridge/forward superstructure
    ctx.fillStyle=fl?C.white:'#4a5a6a';
    ctx.fillRect(-80,-38,78,30);
    ctx.fillStyle=fl?C.white:'#3a4a5a';
    ctx.fillRect(-68,-60,55,24);
    ctx.fillRect(-55,-78,38,20);
    // Mast
    ctx.shadowBlur=0;
    ctx.strokeStyle=fl?C.white:'#8090a0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-36,-78); ctx.lineTo(-36,-106); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-50,-100); ctx.lineTo(-20,-100); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-36,-106); ctx.lineTo(-36,-118); ctx.stroke();
    // Funnels with smoke
    ctx.fillStyle='#1e2838';
    ctx.fillRect(32,-28,10,20); ctx.fillRect(48,-24,9,16);
    // Turrets
    const tpos=[-100,-30,55];
    for(const tx of tpos){
      ctx.fillStyle=fl?C.white:'#304050';
      ctx.beginPath(); ctx.arc(tx,-2,13,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.translate(tx,-2); ctx.rotate(this.turretPhase*(tx>0?0.6:-0.6));
      ctx.fillStyle=fl?C.white:'#1e3040';
      ctx.fillRect(-3,0,6,22);
      if(Math.abs(tx)>40){ ctx.fillRect(-6,0,4,22); ctx.fillRect(2,0,4,22); }
      ctx.restore();
    }
    // Deck details
    if(!fl){
      ctx.strokeStyle='rgba(255,255,220,0.2)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-118,-4); ctx.lineTo(118,-4); ctx.stroke();
      ctx.setLineDash([6,6]);
      ctx.strokeStyle='rgba(255,200,0,0.3)';
      ctx.beginPath(); ctx.moveTo(-110,8); ctx.lineTo(110,8); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
    // HP bar
    const bw=95*s,bh=4,bx=p.x-bw/2,by=p.y-52*s;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx,by,bw,bh);
    const hr=this.hp/this.maxHp;
    ctx.fillStyle=hr>0.5?C.green:(hr>0.25?C.amber:C.pink);
    ctx.fillRect(bx,by,bw*hr,bh);
  }
}

// ─── Boss Carrier ─────────────────────────────────────────────────────────────
class BossCarrier {
  constructor(wave){
    this.wx=0; this.wy=-12; this.wz=W+250;
    this.maxHp=1200+(wave-5)*220; this.hp=this.maxHp;
    this.radius=200; this.score=800+(wave-5)*100;
    this.alive=true; this.flashTimer=0;
    this.fireTimer=1.5; this.turretPhase=0;
    this.enterTimer=3; this.phase2=false;
    this.spawnTimer=10; this.wave=wave; this.smokeTimer=0;
  }
  get isEntering(){ return this.enterTimer>0; }
  update(dt,eBullets,enemies,particles){
    this.turretPhase+=dt*0.45; this.flashTimer=Math.max(0,this.flashTimer-dt);
    this.phase2=this.hp<this.maxHp*0.5;
    this.smokeTimer-=dt;
    if(this.smokeTimer<=0&&!this.isEntering){
      this.smokeTimer=0.12;
      for(const ox of [60,90]){
        particles.push(new Particle(this.wx+ox,this.wy+72,this.wz,rand(-5,5),25,rand(-10,10),1.1,0.04,'rgba(130,130,130,0.4)'));
      }
    }
    if(this.enterTimer>0){
      this.enterTimer=Math.max(0,this.enterTimer-dt);
      const t=1-this.enterTimer/3;
      this.wz=W+250-(W+250-1500)*t;
      return;
    }
    this.wz=Math.max(900,this.wz-(5+this.wave*0.5)*dt);
    this.wx=Math.sin(this.turretPhase*0.28)*90;
    this.fireTimer-=dt;
    if(this.fireTimer<=0){
      const spd=this.phase2?1.7:1.0;
      this.fireTimer=this.phase2?0.75:1.25;
      const n=this.phase2?9:5;
      for(let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2+this.turretPhase;
        const dx=(cam.x-this.wx)*0.003+Math.cos(a)*0.28;
        const dy=(cam.y-this.wy)*0.003+Math.sin(a)*0.18;
        eBullets.push(new EBullet(this.wx+Math.cos(a)*90,this.wy+32,this.wz,dx*580,dy*280+100,-360*spd,this.phase2?21:15));
      }
      playEnemyShot();
    }
    this.spawnTimer-=dt;
    if(this.spawnTimer<=0){ this.spawnTimer=this.phase2?6:11; enemies.push(new EnemyJet(this.wave)); }
    if(this.wz<280) game.player&&game.player.takeDamage(35*dt,particles);
  }
  takeDamage(amount,particles){
    this.hp-=amount; this.flashTimer=0.08;
    if(this.hp<=0){
      this.alive=false;
      for(let i=0;i<5;i++) explode3D(this.wx+rand(-120,120),this.wy+rand(-20,70),this.wz,[C.pink,C.cyan,C.amber,'#ff6600','#ffffff'][i],particles,22);
      playBossDeath();
    }
  }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p||p.y>H+100||p.y<HORIZON-100) return;
    const s=Math.min(p.s,0.85), fl=this.flashTimer>0;
    const bodyCol=fl?C.white:(this.phase2?'#7a5040':'#58687a');
    ctx.save(); ctx.translate(p.x,p.y); ctx.scale(s,s);
    // Wake
    ctx.fillStyle='rgba(40,70,140,0.2)';
    ctx.beginPath(); ctx.ellipse(0,48,230,30,0,0,Math.PI*2); ctx.fill();
    // Main flight deck
    ctx.shadowBlur=fl?30:12; ctx.shadowColor=fl?C.white:(this.phase2?C.pink:'rgba(100,120,150,0.5)');
    ctx.fillStyle=bodyCol;
    ctx.beginPath(); ctx.moveTo(-215,-16); ctx.lineTo(215,-16); ctx.lineTo(198,32); ctx.lineTo(-198,32); ctx.closePath(); ctx.fill();
    // Deck angled bow
    ctx.beginPath(); ctx.moveTo(-215,-16); ctx.lineTo(-198,-35); ctx.lineTo(198,-35); ctx.lineTo(215,-16); ctx.closePath();
    ctx.fillStyle=fl?C.white:(this.phase2?'#6a4030':'#485870'); ctx.fill();
    // Deck markings
    if(!fl){
      ctx.strokeStyle='rgba(255,255,200,0.22)'; ctx.lineWidth=3;
      ctx.setLineDash([15,8]);
      ctx.beginPath(); ctx.moveTo(-210,-25); ctx.lineTo(210,-25); ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle='rgba(255,200,0,0.35)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-200,10); ctx.lineTo(200,10); ctx.stroke();
      // Runway numbers
      ctx.fillStyle='rgba(255,255,200,0.3)'; ctx.font='bold 12px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('07',-160,28); ctx.fillText('25',160,28);
    }
    // Hull sides
    ctx.fillStyle=fl?C.white:'#485868';
    ctx.beginPath(); ctx.moveTo(-198,32); ctx.lineTo(198,32); ctx.lineTo(185,58); ctx.lineTo(-185,58); ctx.closePath(); ctx.fill();
    // Island superstructure
    ctx.fillStyle=fl?C.white:'#3a4a58';
    ctx.fillRect(110,-72,96,38); ctx.fillRect(125,-98,72,28); ctx.fillRect(138,-122,52,26);
    ctx.fillRect(145,-148,40,28);
    // Mast
    ctx.shadowBlur=0;
    ctx.strokeStyle=fl?C.white:'#8090a0'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(165,-148); ctx.lineTo(165,-175); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(148,-168); ctx.lineTo(182,-168); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(165,-175); ctx.lineTo(165,-190); ctx.stroke();
    // Funnels
    ctx.fillStyle='#18202e';
    ctx.fillRect(120,-68,12,26); ctx.fillRect(140,-62,10,20); ctx.fillRect(162,-58,9,16);
    // Deck turrets
    const tpos=[-175,-90,0,80];
    for(const tx of tpos){
      ctx.fillStyle=fl?C.white:'#283848';
      ctx.beginPath(); ctx.arc(tx,-20,15,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.translate(tx,-20); ctx.rotate(this.turretPhase*(tx>0?0.55:-0.55));
      ctx.fillStyle=fl?C.white:'#182838';
      ctx.fillRect(-3,0,6,26); ctx.fillRect(-7,0,5,26); ctx.fillRect(2,0,5,26);
      ctx.restore();
    }
    // Phase 2 red glow
    if(this.phase2){
      ctx.save();
      ctx.globalAlpha=0.25+0.15*Math.sin(Date.now()/140);
      ctx.shadowBlur=35; ctx.shadowColor=C.pink;
      ctx.strokeStyle=C.pink; ctx.lineWidth=4;
      ctx.strokeRect(-215,-38,430,100);
      ctx.restore();
    }
    ctx.restore();
    // HP bar
    const bw=300*s,bh=7,bx=p.x-bw/2,by=p.y-80*s;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(bx,by,bw,bh);
    const hr=clamp(this.hp/this.maxHp,0,1);
    ctx.fillStyle=this.phase2?C.pink:C.purple; ctx.fillRect(bx,by,bw*hr,bh);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  }
}

// ─── Power-Up 3D ──────────────────────────────────────────────────────────────
class PU3D {
  constructor(wx,wy,wz,type){
    Object.assign(this,{wx,wy,wz,type,alive:true,age:0,maxAge:8,rot:0});
  }
  update(dt){ this.wz-=55*dt; this.rot+=dt*2; this.age+=dt; if(this.age>this.maxAge||this.wz<100) this.alive=false; }
  draw(ctx){
    const p=project(this.wx,this.wy,this.wz); if(!p) return;
    const cfg=POWERUP_CFG[this.type];
    const fade=this.age/this.maxAge>0.7?clamp(1-(this.age/this.maxAge-0.7)/0.3,0.3,1):1;
    const r=13*Math.max(0.3,p.s);
    ctx.save(); ctx.globalAlpha=fade; ctx.translate(p.x,p.y); ctx.rotate(this.rot);
    ctx.shadowBlur=16; ctx.shadowColor=cfg.color;
    ctx.strokeStyle=cfg.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=cfg.color+'44'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle=cfg.color;
    const fs=Math.max(6,8*p.s);
    ctx.font=`bold ${fs}px Segoe UI`; ctx.textAlign='center';
    ctx.fillText(cfg.label,0,fs*0.35);
    ctx.restore();
  }
}

// ─── Player Fighter Jet ───────────────────────────────────────────────────────
class Player {
  constructor(){
    this.wx=0; this.wy=80;
    this.hp=100; this.maxHp=100;
    this.bank=0; this.enginePhase=0;
    this.fireTimer=0; this.invTimer=0; this.alive=true;
    this.weapon='normal'; this.weaponTimer=0;
  }
  update(dt,bullets,particles){
    let mx=0,my=0;
    if(keys['ArrowLeft']||keys['KeyA']) mx=-1;
    if(keys['ArrowRight']||keys['KeyD']) mx=1;
    if(keys['ArrowUp']||keys['KeyW']) my=1;
    if(keys['ArrowDown']||keys['KeyS']) my=-1;
    this.wx=clamp(this.wx+mx*210*dt,-520,520);
    this.wy=clamp(this.wy+my*155*dt,20,240);
    cam.x=this.wx; cam.y=this.wy;
    this.bank+=(mx*0.38-this.bank)*dt*6;
    this.enginePhase+=dt*8;
    const fr=this.weapon==='rapid'?0.055:this.weapon==='missile'?0.5:0.13;
    this.fireTimer-=dt;
    if(this.fireTimer<=0){
      this.fireTimer=fr;
      if(this.weapon==='spread'){
        for(const ox of [-65,0,65]) bullets.push(new PBullet(this.wx+ox,this.wy,200,2700,20,'spread'));
      } else if(this.weapon==='rapid'){
        bullets.push(new PBullet(this.wx,this.wy,200,3100,17,'rapid'));
      } else if(this.weapon==='laser'){
        bullets.push(new PBullet(this.wx,this.wy,200,3600,55,'laser'));
      } else if(this.weapon==='missile'){
        bullets.push(new PBullet(this.wx,this.wy,200,1900,80,'missile'));
      } else {
        bullets.push(new PBullet(this.wx,this.wy,200,2700,25));
      }
      playShot();
    }
    if(this.weapon!=='normal'){ this.weaponTimer-=dt; if(this.weaponTimer<=0) this.weapon='normal'; }
    if(this.invTimer>0) this.invTimer-=dt;
    if(this.hp<=0) this.alive=false;

  takeDamage(amount,particles){

    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.ellipse(0,-33,5,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

    ctx.strokeStyle='rgba(180,220,255,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,-46); ctx.lineTo(0,-20); ctx.stroke();
    // Reflection

    ctx.beginPath(); ctx.ellipse(-1.5,-38,1.8,5,0.25,0,Math.PI*2); ctx.fill();

    // Vertical fin
    ctx.fillStyle='#5a6a8a';
    ctx.beginPath(); ctx.moveTo(0,12); ctx.lineTo(-4,32); ctx.lineTo(4,32); ctx.lineTo(2,-4); ctx.closePath(); ctx.fill();
    // Tail band
    ctx.fillStyle='rgba(233,69,96,0.7)';

    // Nose probe

    // Invincibility flash

    // Health ring
    const hr=this.hp/this.maxHp;

    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=3;

// ─── Game State ───────────────────────────────────────────────────────────────
const game={
  state:'menu', player:null,
  enemies:[], bullets:[], eBullets:[], particles:[], powerUps:[],
  boss:null, bossDefeated:false, lastBossScore:0,
  score:0, highScore:parseInt(localStorage.getItem('vs3d_hs')||'0'),
  wave:0, totalEnemies:0, spawned:0, spawnTimer:0,
  waveBreakTimer:0, shakeTimer:0, shakeIntensity:0, lastTime:0,

  start(){
    this.player=new Player();
    this.enemies=[];this.bullets=[];this.eBullets=[];this.particles=[];this.powerUps=[];
    this.boss=null;this.bossDefeated=false;this.lastBossScore=0;
    this.score=0;this.wave=0;cam.x=0;cam.y=80;
    this.state='playing'; this.nextWave();
  },
  nextWave(){
    this.wave++; this.bossDefeated=false;
    if(isBossWave(this.wave)){
      this.totalEnemies=0;this.spawned=0;this.spawnTimer=0;
      this.boss=new BossCarrier(this.wave); this.eBullets=[];
    } else {
      this.totalEnemies=6+(this.wave-1)*3;
      this.spawned=0;this.spawnTimer=0;this.boss=null;
    }
    this.state='playing';
  },
  triggerShake(i,d){ this.shakeIntensity=i;this.shakeTimer=d; },
  gameOver(){
    if(this.score>this.highScore){ this.highScore=this.score; localStorage.setItem('vs3d_hs',this.highScore); }
    this.state='game_over';
  },
};

// ─── Spawning ─────────────────────────────────────────────────────────────────
function spawnEnemy(wave){
  const r=Math.random();
  if(wave<=2) return new EnemyJet(wave);
  if(wave<=3) return r<0.55?new EnemyJet(wave):new Tank(wave);
  if(wave<=5) return r<0.3?new EnemyJet(wave):r<0.65?new Tank(wave):new Warship(wave);
  return r<0.2?new EnemyJet(wave):r<0.55?new Tank(wave):new Warship(wave);
}
function tryDropPU(e){
  if(Math.random()<0.28)
    game.powerUps.push(new PU3D(e.wx,e.wy+10,e.wz,PU_TYPES[randInt(0,PU_TYPES.length-1)]));
}

// ─── Collision ────────────────────────────────────────────────────────────────
function dist3(a,b){ return Math.hypot(b.wx-a.wx,b.wy-a.wy,(b.wz-a.wz)*0.25); }
function resolveCollisions(){
  // Player bullets vs enemies
  for(const b of game.bullets){
    if(!b.alive) continue;
    for(const e of game.enemies){
      if(!e.alive) continue;
      if(dist3(b,e)<b.radius+e.radius){
        if(b.type==='laser'){
          if(!b.hitEnemies.has(e)){ b.hitEnemies.add(e); e.takeDamage(b.damage,game.particles); if(!e.alive){ game.score+=e.score; tryDropPU(e); } }
        } else {
          e.takeDamage(b.damage,game.particles); b.alive=false;
          if(!e.alive){ game.score+=e.score; tryDropPU(e); }
          break;
        }
      }
    }
    // vs boss
    if(b.alive&&game.boss&&!game.boss.isEntering&&dist3(b,game.boss)<b.radius+game.boss.radius){
      if(b.type==='laser'){
        if(!b.hitEnemies.has(game.boss)){ b.hitEnemies.add(game.boss); game.boss.takeDamage(b.damage,game.particles); }
      } else { game.boss.takeDamage(b.damage,game.particles); b.alive=false; }
    }
  }
  // Enemy bullets vs player
  const pl=game.player;
  for(const eb of game.eBullets){
    if(!eb.alive) continue;
    if(Math.hypot(eb.wx-pl.wx,eb.wy-pl.wy)<48&&eb.wz<320){ eb.alive=false; pl.takeDamage(eb.damage,game.particles); }
  }
  // Power-up pickup
  for(const pu of game.powerUps){
    if(!pu.alive) continue;
    if(Math.hypot(pu.wx-pl.wx,pu.wy-pl.wy)<65&&pu.wz<360){
      pu.alive=false;
      if(pu.type==='shield'){ pl.hp=Math.min(pl.maxHp,pl.hp+30); }
      else { pl.weapon=pu.type; pl.weaponTimer=POWERUP_CFG[pu.type].duration; }
      playPU();
      explode3D(pu.wx,pu.wy,pu.wz,POWERUP_CFG[pu.type].color,game.particles,8);
    }
  }
}

// ─── Background ───────────────────────────────────────────────────────────────
const stars=Array.from({length:80},()=>({x:rand(0,W),y:rand(0,HORIZON),r:rand(0.5,2),a:rand(0.2,0.9)}));
let worldOff=0;
const clouds=Array.from({length:18},(_,i)=>({wx:rand(-600,600),wy:rand(90,230),wz:i*300+100,w:rand(70,180),h:rand(18,45),a:rand(0.12,0.35)}));

function drawBG(ctx,dt){
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,HORIZON);
  sg.addColorStop(0,'#020210'); sg.addColorStop(0.6,'#080820'); sg.addColorStop(1,'#0c1428');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,HORIZON);
  // Stars
  for(const s of stars){
    const a=s.a*(0.6+0.4*Math.sin(Date.now()/1800+s.x));
    ctx.globalAlpha=a; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Ocean/ground gradient
  const og=ctx.createLinearGradient(0,HORIZON,0,H);
  og.addColorStop(0,'#0a1828'); og.addColorStop(0.12,'#0c1e30'); og.addColorStop(1,'#070e18');
  ctx.fillStyle=og; ctx.fillRect(0,HORIZON,W,H-HORIZON);
  // Ocean grid
  ctx.strokeStyle='rgba(20,60,110,0.38)'; ctx.lineWidth=1;
  const vx=W/2;
  for(let xi=-8;xi<=8;xi++){ ctx.beginPath(); ctx.moveTo(vx,HORIZON); ctx.lineTo(vx+xi*110,H); ctx.stroke(); }
  for(let zi=1;zi<=14;zi++){
    const t=zi/14, y=HORIZON+(H-HORIZON)*t*t, xs=(W/2)*t*1.7;
    ctx.beginPath(); ctx.moveTo(vx-xs,y); ctx.lineTo(vx+xs,y); ctx.stroke();
  }
  // Horizon glow
  ctx.fillStyle='rgba(20,60,110,0.12)'; ctx.fillRect(0,HORIZON-2,W,12);
  // Clouds
  if(dt){ worldOff+=100*dt; for(const cl of clouds){ cl.wz-=100*dt; if(cl.wz<80){ cl.wz=2600; cl.wx=rand(-600,600); } } }
  for(const cl of clouds){
    const p=project(cl.wx,cl.wy,cl.wz); if(!p||p.y>HORIZON+4||p.y<0) continue;
    ctx.globalAlpha=cl.a; ctx.fillStyle='rgba(140,168,210,1)';
    ctx.beginPath(); ctx.ellipse(p.x,p.y,cl.w*p.s,cl.h*p.s,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD(ctx){
  const pl=game.player;
  ctx.fillStyle=C.cyan; ctx.font='bold 14px Segoe UI'; ctx.textAlign='left';
  ctx.fillText('SCORE',12,22); ctx.font='bold 28px Segoe UI'; ctx.fillText(game.score,12,50);
  ctx.fillStyle='rgba(83,216,251,0.5)'; ctx.font='12px Segoe UI'; ctx.fillText('BEST '+game.highScore,12,68);
  ctx.fillStyle=C.amber; ctx.font='bold 14px Segoe UI'; ctx.textAlign='right';
  ctx.fillText('WAVE',W-12,22); ctx.font='bold 28px Segoe UI'; ctx.fillText(game.wave,W-12,50);
  if(pl.weapon!=='normal'){
    const wc=POWERUP_CFG[pl.weapon], wr=clamp(pl.weaponTimer/wc.duration,0,1);
    ctx.textAlign='center'; ctx.font='bold 12px Segoe UI'; ctx.shadowBlur=8; ctx.shadowColor=wc.color;
    ctx.fillStyle=wc.color; ctx.fillText('⚡ '+wc.label,W/2,H-58); ctx.shadowBlur=0;
    const tw=130,th=4,tx=W/2-65,ty=H-50;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(tx,ty,tw,th);
    ctx.fillStyle=wc.color; ctx.fillRect(tx,ty,tw*wr,th);
    ctx.textAlign='left';
  }
  const bw=280,bh=16,bx=W/2-140,by=H-34;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(bx,by,bw,bh);
  const hr=clamp(pl.hp/pl.maxHp,0,1);
  ctx.fillStyle=hr>0.5?C.green:(hr>0.25?C.amber:C.pink); ctx.fillRect(bx,by,bw*hr,bh);
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle=C.white; ctx.font='bold 10px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(`HP  ${Math.max(0,Math.ceil(pl.hp))} / ${pl.maxHp}`,W/2,by+12);
  ctx.textAlign='left';
}
function drawBossHUD(ctx){
  if(!game.boss||game.boss.isEntering) return;
  const boss=game.boss, bw=440,bh=14,bx=W/2-220,by=22;
  const pulse=0.8+0.2*Math.sin(Date.now()/180);
  ctx.textAlign='center'; ctx.font='bold 10px Segoe UI';
  ctx.shadowBlur=10*pulse; ctx.shadowColor=boss.phase2?C.pink:C.purple;
  ctx.fillStyle=boss.phase2?C.pink:C.purple;
  ctx.fillText('⚡  ENEMY CARRIER  ⚡',W/2,16); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(bx-3,by-3,bw+6,bh+6);
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(bx,by,bw,bh);
  const r=clamp(boss.hp/boss.maxHp,0,1);
  ctx.fillStyle=boss.phase2?C.pink:C.purple; ctx.fillRect(bx,by,bw*r,bh);
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bx+bw/2,by); ctx.lineTo(bx+bw/2,by+bh); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle=C.white; ctx.font='bold 9px Segoe UI';
  ctx.fillText(`${Math.max(0,Math.ceil(boss.hp))} / ${boss.maxHp}`,W/2,by+bh-1);
  if(boss.phase2){ ctx.fillStyle=C.pink; ctx.font='bold 8px Segoe UI'; ctx.fillText('PHASE 2',W/2,by+bh+11); }
  ctx.textAlign='left';
}
function drawWaveBreak(ctx){
  ctx.fillStyle='rgba(10,10,26,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; const secs=Math.ceil(game.waveBreakTimer);
  if(game.bossDefeated){
    ctx.font='bold 48px Segoe UI'; ctx.shadowBlur=35; ctx.shadowColor=C.pink;
    ctx.fillStyle=C.pink; ctx.fillText('CARRIER DESTROYED!',W/2,H/2-50); ctx.shadowBlur=0;
    ctx.fillStyle=C.amber; ctx.font='bold 26px Segoe UI'; ctx.fillText(`+${game.lastBossScore} pts`,W/2,H/2+5);
    ctx.fillStyle=C.white; ctx.font='18px Segoe UI'; ctx.fillText(`Next wave in ${secs}...`,W/2,H/2+45);
  } else {
    ctx.fillStyle=C.cyan; ctx.font='bold 36px Segoe UI'; ctx.shadowBlur=20; ctx.shadowColor=C.cyan;
    ctx.fillText(`WAVE ${game.wave} CLEAR!`,W/2,H/2-20); ctx.shadowBlur=0;
    ctx.fillStyle=C.white; ctx.font='20px Segoe UI'; ctx.fillText(`Next wave in ${secs}...`,W/2,H/2+20);
    if(isBossWave(game.wave+1)){
      const pulse=0.6+0.4*Math.sin(Date.now()/200);
      ctx.fillStyle=`rgba(233,69,96,${pulse})`; ctx.font='bold 24px Segoe UI';
      ctx.shadowBlur=18; ctx.shadowColor=C.pink;
      ctx.fillText('⚠  CARRIER APPROACHING  ⚠',W/2,H/2+68); ctx.shadowBlur=0;
    }
  }
  ctx.textAlign='left';
}
function drawMenu(ctx){
  drawBG(ctx,0);
  ctx.fillStyle='rgba(8,8,22,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 72px Segoe UI'; ctx.shadowBlur=35; ctx.shadowColor=C.pink;
  ctx.fillStyle=C.pink; ctx.fillText('VOID',W/2-88,H/2-60);
  ctx.fillStyle=C.cyan; ctx.shadowColor=C.cyan; ctx.fillText('STRIKE',W/2+90,H/2-60); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(200,215,235,0.85)'; ctx.font='19px Segoe UI'; ctx.fillText('3D Air Combat',W/2,H/2-16);
  const pulse=0.6+0.4*Math.sin(Date.now()/400);
  ctx.fillStyle=`rgba(83,216,251,${pulse})`; ctx.font='bold 20px Segoe UI';
  ctx.fillText('CLICK OR PRESS ENTER TO START',W/2,H/2+40);
  ctx.fillStyle='rgba(168,178,216,0.55)'; ctx.font='14px Segoe UI';
  ctx.fillText('WASD / Arrows — Move   Auto-fire always active',W/2,H/2+82);
  ctx.fillStyle='rgba(168,178,216,0.4)'; ctx.font='12px Segoe UI';
  ctx.fillText('Enemies: Fighter Jets  •  Tanks  •  Warships  •  Boss Carrier (every 5 waves)',W/2,H/2+108);
  if(game.highScore>0){ ctx.fillStyle=C.amber; ctx.font='16px Segoe UI'; ctx.fillText(`Best: ${game.highScore}`,W/2,H/2+140); }
  ctx.textAlign='left';
}
const retryBtn={x:W/2-90,y:H/2+50,w:180,h:46};
function drawGameOver(ctx){
  drawBG(ctx,0);
  ctx.fillStyle='rgba(8,8,22,0.85)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 60px Segoe UI'; ctx.shadowBlur=25; ctx.shadowColor=C.pink;
  ctx.fillStyle=C.pink; ctx.fillText('GAME OVER',W/2,H/2-80); ctx.shadowBlur=0;
  ctx.fillStyle=C.cyan; ctx.font='bold 26px Segoe UI'; ctx.fillText(`Score: ${game.score}`,W/2,H/2-28);
  ctx.fillStyle=C.amber; ctx.font='20px Segoe UI'; ctx.fillText(`Wave: ${game.wave}`,W/2,H/2+8);
  ctx.fillStyle='rgba(168,178,216,0.7)'; ctx.font='16px Segoe UI'; ctx.fillText(`Best: ${game.highScore}`,W/2,H/2+35);
  const hover=mouse.x>=retryBtn.x&&mouse.x<=retryBtn.x+retryBtn.w&&mouse.y>=retryBtn.y&&mouse.y<=retryBtn.y+retryBtn.h;
  ctx.fillStyle=hover?C.pink:'rgba(233,69,96,0.75)';
  ctx.shadowBlur=hover?15:0; ctx.shadowColor=C.pink;
  roundRect(ctx,retryBtn.x,retryBtn.y,retryBtn.w,retryBtn.h,10); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle=C.white; ctx.font='bold 18px Segoe UI'; ctx.fillText('PLAY AGAIN',W/2,retryBtn.y+30);
  ctx.textAlign='left';
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function loop(ts){
  const dt=Math.min((ts-game.lastTime)/1000,0.1); game.lastTime=ts;
  if(game.state==='menu'){ drawMenu(ctx); requestAnimationFrame(loop); return; }
  if(game.state==='game_over'){ drawGameOver(ctx); requestAnimationFrame(loop); return; }

  ctx.save();
  if(game.shakeTimer>0){
    game.shakeTimer-=dt;
    const si=game.shakeIntensity*(game.shakeTimer/0.3);
    ctx.translate((Math.random()-0.5)*si*2,(Math.random()-0.5)*si*2);
  }
  drawBG(ctx,dt);

  if(game.state==='playing'&&!isBossWave(game.wave)){
    const si=Math.max(0.55,1.8-(game.wave-1)*0.14);
    game.spawnTimer-=dt;
    if(game.spawnTimer<=0&&game.spawned<game.totalEnemies){
      game.enemies.push(spawnEnemy(game.wave)); game.spawned++; game.spawnTimer=si;
    }
    if(game.spawned>=game.totalEnemies&&game.enemies.length===0){
      game.state='wave_break'; game.waveBreakTimer=3;
    }
  }
  if(game.state==='wave_break'){ game.waveBreakTimer-=dt; if(game.waveBreakTimer<=0) game.nextWave(); }

  game.player.update(dt,game.bullets,game.particles);
  for(const e of game.enemies) e.update(dt,game.eBullets,game.particles);

  if(game.boss){
    game.boss.update(dt,game.eBullets,game.enemies,game.particles);
    if(!game.boss.alive){
      game.lastBossScore=game.boss.score; game.score+=game.boss.score;
      game.boss=null; game.bossDefeated=true; game.state='wave_break'; game.waveBreakTimer=4;
      game.triggerShake(22,0.8);
    }
  }

  for(const b of game.bullets) b.update(dt);
  for(const eb of game.eBullets) eb.update(dt);
  for(const p of game.particles) p.update(dt);
  for(const pu of game.powerUps) pu.update(dt);
  resolveCollisions();
  if(game.player.invTimer>0.45) game.triggerShake(6,0.25);

  // Sort enemies far→near for correct draw order
  const drawEnemies=[...game.enemies].sort((a,b)=>b.wz-a.wz);

  game.enemies     =game.enemies.filter(e=>e.alive);
  game.bullets     =game.bullets.filter(b=>b.alive);
  game.eBullets    =game.eBullets.filter(eb=>eb.alive);
  game.particles   =game.particles.filter(p=>p.alive);
  game.powerUps    =game.powerUps.filter(pu=>pu.alive);

  for(const p of game.particles) p.draw(ctx);
  for(const pu of game.powerUps) pu.draw(ctx);
  for(const e of drawEnemies) e.draw(ctx);
  if(game.boss) game.boss.draw(ctx);
  for(const eb of game.eBullets) eb.draw(ctx);
  for(const b of game.bullets) b.draw(ctx);
  game.player.draw(ctx);

  drawHUD(ctx); drawBossHUD(ctx);
  if(game.state==='wave_break') drawWaveBreak(ctx);
  ctx.restore();

  if(!game.player.alive) game.gameOver();
  requestAnimationFrame(loop);
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{ keys[e.code]=true; if((e.code==='Enter'||e.code==='Space')&&game.state==='menu') game.start(); e.preventDefault(); });
document.addEventListener('keyup',e=>{ keys[e.code]=false; });
canvas.addEventListener('mousemove',e=>{ const r=canvas.getBoundingClientRect(); mouse.x=(e.clientX-r.left)*W/r.width; mouse.y=(e.clientY-r.top)*H/r.height; });
canvas.addEventListener('mousedown',()=>{
  if(game.state==='menu') game.start();
  if(game.state==='game_over'&&mouse.x>=retryBtn.x&&mouse.x<=retryBtn.x+retryBtn.w&&mouse.y>=retryBtn.y&&mouse.y<=retryBtn.y+retryBtn.h) game.start();
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
requestAnimationFrame(loop);
</script>
